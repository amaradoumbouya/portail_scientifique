{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Connexion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta content="Admin Dashboard" name="description" />
    <meta content="ThemeDesign" name="author" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <link rel="shortcut icon" href="assets/images/favicon.ico">

    <link href="{% static 'back/assets/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'back/assets/css/icons.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'back/assets/css/style.css' %}" rel="stylesheet" type="text/css">

</head>


<body>

    <!-- Begin page -->
    <div class="accountbg"></div>
    <div class="wrapper-page">
        <div class="panel panel-color panel-primary panel-pages">

            <div class="panel-body">
                <h3 class="text-center m-t-0 m-b-30">
                    <span class=""><img src="{% static 'back/assets/images/logo.png' %}" alt="logo" height="32"></span>
                </h3>
                <h4 class="text-muted text-center m-t-0"><b>Connectez - vous</b></h4>

                <form action=" {% url 'portail_site:connexion' %} " method="POST" class="form-horizontal m-t-20">

                    {% csrf_token %}
                    {% if messages %}
                    <ul class="messages">
                        {% for message in messages %}
                        <li{% if message.tags %} class="{{ message.tags }}" {% endif %}>
                            <div class="alert alert-success" role="alert">
                                <strong>{{ message }}</strong>
                            </div>
                            </li>
                            {% endfor %}
                    </ul>
                    {% endif %}

                    <div class="form-group">
                        <div class="col-xs-12">
                            <input type="email" name="email" class="form-control" required="" placeholder="Email">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="col-xs-12">
                            <input type="password" name="password" class="form-control" required="" placeholder="Password">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="col-xs-12">
                            <div class="checkbox checkbox-primary">
                                <input id="checkbox-signup" type="checkbox">
                                <label for="checkbox-signup">
                                    Se rappeler de moi
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group text-center m-t-20">
                        <div class="col-xs-12">
                            <button class="btn btn-primary w-md waves-effect waves-light"
                                type="submit">Connexion</button>
                        </div>
                    </div>

                    <div class="form-group m-t-30 m-b-0">
                        <div class="col-sm-7">
                            <a href="pages-recoverpw.html" class="text-muted"><i class="fa fa-lock m-r-5"></i> Mot de
                                passe oublié ?</a>
                        </div>
                        <div class="col-sm-5 text-right">
                            <a href="{% url 'portail_site:inscription' %}" class="text-muted">Créer un compte</a>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>



    <!-- jQuery  -->
    <script src="{% static 'back/assets/js/jquery.min.js' %}"></script>
    <script src="{% static 'back/assets/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'back/assets/js/modernizr.min.js' %}"></script>
    <script src="{% static 'back/assets/js/detect.js' %}"></script>
    <script src="{% static 'back/assets/js/fastclick.js' %}"></script>
    <script src="{% static 'back/assets/js/jquery.slimscroll.js' %}"></script>
    <script src="{% static 'back/assets/js/jquery.blockUI.js' %}"></script>
    <script src="{% static 'back/assets/js/waves.js' %}"></script>
    <script src="{% static 'back/assets/js/wow.min.js' %}"></script>
    <script src="{% static 'back/assets/js/jquery.nicescroll.js' %}"></script>
    <script src="{% static 'back/assets/js/jquery.scrollTo.min.js' %}"></script>
    <script src="{% static 'back/assets/js/app.js' %}"></script>

</body>

</html>
