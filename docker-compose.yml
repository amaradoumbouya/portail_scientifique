version: "3.9"

services:
  db:
    image: mariadb:11
    container_name: portail_db
    restart: always
    environment:
      MARIADB_DATABASE: portail_db
      MARIADB_USER: portail_user
      MARIADB_PASSWORD: ChangeMoi_Portail_DB_123!
      MARIADB_ROOT_PASSWORD: ChangeMoi_Portail_Root_123!
    volumes:
      - portail_db_data:/var/lib/mysql

  web:
    build: .
    container_name: portail_web
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      - db
    environment:
      DB_NAME: portail_db
      DB_USER: portail_user
      DB_PASSWORD: ChangeMoi_Portail_DB_123!
      DB_HOST: db
      DB_PORT: "3306"

volumes:
  portail_db_data:
